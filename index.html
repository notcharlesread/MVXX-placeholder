<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#FFFFFF">
  
  <title>MVXX — Coming Soon</title>
  <meta name="description" content="MVXX. Coming soon.">
  
  <!-- Open Graph -->
  <meta property="og:title" content="MVXX">
  <meta property="og:description" content="Coming soon.">
  <meta property="og:url" content="https://mvxx.com">
  <meta property="og:type" content="website">
  
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="MVXX">
  <meta name="twitter:description" content="Coming soon.">
  
  <!-- Fonts: Space Grotesk + Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  
  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%23FFFFFF%22/><text x=%2250%22 y=%2272%22 font-family=%22Space Grotesk, sans-serif%22 font-size=%2280%22 font-weight=%22700%22 text-anchor=%22middle%22 fill=%22%230A0A0A%22>M</text></svg>">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      height: 100%;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #FFFFFF;
      color: #0A0A0A;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    
    /* Thin red masthead stripe */
    .masthead-stripe {
      width: 100%;
      height: 6px;
      background-color: #FF0000;
      flex-shrink: 0;
    }
    
    /* Main content container */
    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }
    
    /* MVXX Wordmark */
    .wordmark {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: clamp(80px, 18vw, 200px);
      line-height: 1;
      letter-spacing: 0.02em;
      color: #0A0A0A;
      margin-bottom: 32px;
    }
    
    /* Red accent line under wordmark */
    .accent-line {
      width: 64px;
      height: 4px;
      background-color: #FF0000;
      margin-bottom: 48px;
    }
    
    /* Coming soon label */
    .coming-soon {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #0A0A0A;
    }
    
    /* Footer */
    .footer {
      flex-shrink: 0;
      padding: 24px;
      border-top: 1px solid #E0E0E0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      color: #8A8A8A;
      letter-spacing: 0.05em;
    }
    
    .footer-left {
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }
    
    /* Mobile adjustments */
    @media (max-width: 480px) {
      .wordmark {
        margin-bottom: 24px;
      }
      .accent-line {
        margin-bottom: 36px;
      }
      .footer {
        flex-direction: column;
        text-align: center;
      }
    }
    
    /* Reduce motion preference */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <!-- Thin red masthead stripe -->
  <div class="masthead-stripe" role="presentation"></div>
  
  <!-- Main content -->
  <main class="container">
    <h1 class="wordmark">MVXX</h1>
    <div class="accent-line" role="presentation"></div>
    <p class="coming-soon">Coming Soon</p>
  </main>
  
  <!-- Footer -->
  <footer class="footer">
    <div class="footer-left">MVXX Group</div>
    <div class="footer-right">© 2026 — All rights reserved</div>
  </footer>
</body>
</html>
